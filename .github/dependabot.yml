# Dependabot — weekly dependency updates.
#
# - github-actions: `uses:` refs in .github/workflows/*.yml
# - docker:         the base image in the Dockerfile (ubuntu:24.04)
# - pip:            the Python build deps in requirements.txt
#
# The Build workflow runs on each PR so breakage shows before merge.

version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - ci
      - dependencies

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - ci
      - dependencies

  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
