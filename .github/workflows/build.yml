# Build the Neo6502 firmware + emulators on every push and PR, in both the
# clean (ship) configuration and the RRDC=1 (headless-control) configuration.
#
# The clean neo6502.zip is uploaded as an artifact. The RRDC=1 emulator is
# symbol-checked so a broken build gate fails CI instead of silently shipping
# a mislabelled binary.

name: 🟡 Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 🔨 Build (clean + RRDC)
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 🧰 Install toolchain
        run: |
          sudo apt update -y -qq
          sudo apt install -y build-essential cmake git python3 python3-pip 64tass zip
          sudo apt install -y libsdl2-dev gcc-arm-none-eabi mingw-w64 g++-mingw-w64-x86-64
          pip install pillow gitpython
          git submodule update --init
          git clone --depth 1 --branch master https://github.com/raspberrypi/pico-sdk /usr/share/pico_sdk

      - name: 🟡 Build (clean — RRDC off)
        run: make

      - name: 📤 Upload neo6502.zip (clean)
        uses: actions/upload-artifact@v4
        with:
          name: neo6502-zip
          path: release/neo6502.zip

      - name: 🔴 Build the RRDC=1 emulator + assert the backend linked
        run: |
          make -C emulator clean
          make -C emulator RRDC=1
          if nm emulator/neo | grep -q retro_control; then
            echo "RRDC=1 emulator carries the control backend ✔"
          else
            echo "::error::RRDC=1 build linked no retro_control symbols — the build gate is broken"
            exit 1
          fi

      - name: 💬 Notify Discord — build failed
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$WEBHOOK" ] && { echo "no webhook secret — skipping"; exit 0; }
          jq -nc \
            --arg run "$RUN_URL" --arg repo "$GITHUB_REPOSITORY" --arg ref "$GITHUB_REF_NAME" \
            '{embeds:[{
               title:"🔴 Build failed",
               url:$run,
               color:15158332,
               fields:[
                 {name:"Repo", value:$repo, inline:true},
                 {name:"Ref",  value:("`" + $ref + "`"), inline:true}
               ]
             }]}' \
          | curl -fsS -X POST -H "Content-Type: application/json" -d @- "$WEBHOOK"
