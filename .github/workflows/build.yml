# Build the Neo6502 firmware + emulators on every push and PR, in both the
# clean (ship) configuration and the RRDC=1 (headless-control) configuration.
#
# Builds inside the toolchain image (Dockerfile) with a GHA layer cache, so
# the toolchain + pico-sdk are NOT re-installed every run. ccache (persisted
# via the Actions cache) accelerates the emulator recompile. The clean
# neo6502.zip is uploaded; the RRDC=1 emulator is symbol-checked so a broken
# gate fails CI.

name: 🟡 Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 🔨 Build (clean + RRDC)
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔨 Build toolchain image (cached)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          load: true
          tags: neo6502-firmware-builder:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ♻️ Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-build-${{ github.sha }}
          restore-keys: |
            ccache-build-

      - name: 🟡 Build (clean — RRDC off)
        run: |
          docker run --rm \
            -v "${PWD}:/work" -w /work \
            --user "$(id -u):$(id -g)" \
            -e CCACHE_DIR=/work/.ccache \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory -e GIT_CONFIG_VALUE_0=/work \
            neo6502-firmware-builder:ci \
            make CC="ccache g++"

      - name: 📤 Upload neo6502.zip (clean)
        uses: actions/upload-artifact@v4
        with:
          name: neo6502-zip
          path: release/neo6502.zip

      - name: 🔴 Build the RRDC=1 emulator + assert the backend linked
        run: |
          docker run --rm \
            -v "${PWD}:/work" -w /work \
            --user "$(id -u):$(id -g)" \
            -e CCACHE_DIR=/work/.ccache \
            neo6502-firmware-builder:ci \
            bash -c 'set -e; make -C emulator clean; make -C emulator RRDC=1 CC="ccache g++"; nm emulator/neo | grep -q retro_control'
          echo "RRDC=1 emulator carries the control backend ✔"

      - name: 💬 Notify Discord — build failed
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$WEBHOOK" ] && { echo "no webhook secret — skipping"; exit 0; }
          jq -nc \
            --arg run "$RUN_URL" --arg repo "$GITHUB_REPOSITORY" --arg ref "$GITHUB_REF_NAME" \
            '{embeds:[{
               title:"🔴 Build failed",
               url:$run,
               color:15158332,
               fields:[
                 {name:"Repo", value:$repo, inline:true},
                 {name:"Ref",  value:("`" + $ref + "`"), inline:true}
               ]
             }]}' \
          | curl -fsS -X POST -H "Content-Type: application/json" -d @- "$WEBHOOK"
