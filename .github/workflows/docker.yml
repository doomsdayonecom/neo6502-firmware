# Build + publish the firmware build-toolchain image to GitHub Container
# Registry, so build.yml, devcontainers and downstream forks can build the
# firmware without hand-installing 64tass / arm-none-eabi / SDL2 / mingw /
# pico-sdk.
#
# Triggers:
#   - push to main when the Dockerfile (or this workflow) changes
#   - manual workflow_dispatch
#
# Tagged both `:latest` (rolling) and `:sha-<short>` (immutable).

name: 🐳 Publish toolchain image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-builder

jobs:
  publish:
    name: 📤 Build & publish to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📦 Checkout source
        uses: actions/checkout@v7

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️  Compute image tags
        id: tags
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME,,}"
          SHA_SHORT="${GITHUB_SHA:0:7}"
          {
            echo "image=${IMAGE}"
            echo "sha_short=${SHA_SHORT}"
            echo "tags<<EOF"
            echo "${IMAGE}:latest"
            echo "${IMAGE}:sha-${SHA_SHORT}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 🔨 Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: 📝 Post publish summary
        run: |
          {
            echo "## 🐳 Image published"
            echo ""
            echo "Tags pushed to GHCR:"
            echo ""
            echo "- \`${{ steps.tags.outputs.image }}:latest\`"
            echo "- \`${{ steps.tags.outputs.image }}:sha-${{ steps.tags.outputs.sha_short }}\`"
            echo ""
            echo "Pull with:"
            echo ""
            echo '```sh'
            echo "docker pull ${{ steps.tags.outputs.image }}:latest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
