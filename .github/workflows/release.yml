# Tag-driven release for the Doomsday One Neo6502 firmware.
#
# Publishes TWO artifacts on a `v*` tag:
#   - neo6502.zip        — the clean ship build (no debug server)
#   - neo6502-rrdc.zip   — same bundle, but the Linux `neo` emulator is built
#                          with RRDC=1 (the headless control server, contract
#                          0.3.0) for automated testing of downstream ports.
#
# Only the Linux emulator differs between the two zips. Builds inside the
# toolchain image (Dockerfile) with a GHA layer cache.
#
# Trigger:  git tag v1.0.1 && git push origin v1.0.1   (or cut a GitHub Release)

name: 🚀 Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: 🚀 Build + publish release
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Checkout source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive   # the RRDC control core is a submodule

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔨 Build toolchain image (cached)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          load: true
          tags: neo6502-firmware-builder:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: ♻️ Restore ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-release-${{ github.sha }}
          restore-keys: |
            ccache-release-
            ccache-build-

      - name: 🟡 Build clean bundle → neo6502.zip
        run: |
          docker run --rm \
            -v "${PWD}:/work" -w /work \
            --user "$(id -u):$(id -g)" \
            -e CCACHE_DIR=/work/.ccache \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory -e GIT_CONFIG_VALUE_0=/work \
            neo6502-firmware-builder:ci \
            make
          cp release/neo6502.zip neo6502.zip

      - name: 🔴 Build RRDC Linux emulator → neo6502-rrdc.zip
        run: |
          docker run --rm \
            -v "${PWD}:/work" -w /work \
            --user "$(id -u):$(id -g)" \
            -e CCACHE_DIR=/work/.ccache \
            neo6502-firmware-builder:ci \
            bash -c 'set -e; make -C emulator clean; make -C emulator RRDC=1; nm emulator/neo | grep -q retro_control'
          # The RRDC bundle is the clean bundle with only the Linux emulator swapped.
          cp neo6502.zip neo6502-rrdc.zip
          workdir="$RUNNER_TEMP/rrdc"
          rm -rf "$workdir" && mkdir -p "$workdir"
          cp emulator/neo "$workdir/neo"
          ( cd "$workdir" && zip -q "$GITHUB_WORKSPACE/neo6502-rrdc.zip" neo )
          echo "swapped RRDC Linux emulator into neo6502-rrdc.zip ✔"

      - name: 🚀 Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            neo6502.zip
            neo6502-rrdc.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          fail_on_unmatched_files: true

      - name: 💬 Notify Discord — release published
        if: success()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REL_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}
        run: |
          [ -z "$WEBHOOK" ] && { echo "no webhook secret — skipping"; exit 0; }
          jq -nc \
            --arg rel_url "$REL_URL" --arg tag "${GITHUB_REF_NAME}" --arg repo "${GITHUB_REPOSITORY}" \
            '{embeds:[{
               title: ("🚀 Released " + $tag),
               url: $rel_url,
               color: 3447003,
               fields: [
                 {name:"Repo", value:$repo, inline:true},
                 {name:"Tag",  value:("`" + $tag + "`"), inline:true}
               ]
             }]}' \
          | curl -fsS -X POST -H "Content-Type: application/json" -d @- "$WEBHOOK"
